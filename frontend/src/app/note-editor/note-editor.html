<div>
    <mat-form-field>
        <mat-label>Note Name</mat-label>
        <input matInput [(ngModel)] = "noteName" />
    </mat-form-field>
</div>
<div class="editorContainer">
    <!-- ToolBar -->
    <div class ="toolbar">
        <button matButton="filled" (click)="save()">Save</button>
        <button matButton="outlined" (click)="selectMode()">Select</button>
        <button matButton="outlined" (click)="toggleMode()">
            {{ mode === 'text' ? 'Switch to Draw' : 'Switch to Text' }}
        </button>
        <button matButton="outlined" (click)="pdfInput.click()">Upload PDF</button>
        <input #pdfInput type="file" accept=".pdf" style="display:none" (change)="onPdfUpload($event)" />
        <button matButton="outlined" routerLink="/dashboard">Back</button>
    </div>

    <br>
    
    <div class = "layers-container">

        <canvas id="drawingCanvas"></canvas>

    </div>
</div>
